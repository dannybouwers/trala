name: Unit Tests

on:
  pull_request:

jobs:
  pull-request:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKER_HUB_USERNAME: dannybouwers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      
      - name: Run tests
        run: go test ./...
      